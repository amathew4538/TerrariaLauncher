name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # <--- This speeds up subsequent runs significantly

      - name: Set Build Type and Version
        run: |
          sed -i '' 's|\${build.type}|release|g' app/src/main/resources/config.properties
          sed -i '' 's|\${version}|${{ steps.get_version.outputs.VERSION }}|g' app/src/main/resources/config.properties

      - name: Build ShadowJar
        run: ./gradlew shadowJar --no-daemon
        env:
          APP_VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Prepare jpackage input
        run: |
          mkdir -p app_jar
          cp app/build/libs/app-all.jar app_jar/TerrariaLauncher.jar

      - name: Create App Image
        run: |
          jpackage --type app-image \
            --dest app_build \
            --name "TerrariaLauncher" \
            --app-version ${{ steps.get_version.outputs.VERSION }} \
            --input app_jar/ \
            --main-jar TerrariaLauncher.jar \
            --main-class TerrariaLauncher.TerrariaLauncher \
            --icon package-resources/icon.icns \
            --copyright "Copyright 2026 amathew4538" \
            --description "A tModLoader Instance Manager"

      - name: Get iTerm2 Metadata
        id: iterm_meta
        run: |
          # Get the 'Last-Modified' date from the server headers
          LM=$(curl -sI "https://iterm2.com/downloads/stable/latest" | grep -i "Last-Modified" | tr -d '\r')
          echo "LAST_MODIFIED=$LM" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache iTerm2
        id: cache-iterm
        uses: actions/cache@v4
        with:
          path: iterm.zip
          key: iterm2-stable-${{ steps.iterm_meta.outputs.LAST_MODIFIED }}

      - name: Bundle iTerm2 and License
        run: |
          # Only download if the cache missed
          if [ ! -f iterm.zip ]; then
            echo "Cache miss! Downloading latest iTerm2..."
            curl -L -f "https://iterm2.getiterm2.com/downloads/stable/latest" -o iterm.zip
          else
            echo "Cache hit! Using cached iTerm2."
          fi
          unzip -q iterm.zip -d app_build/
          cp LICENSE app_build/LICENSE.txt

      - name: Create FixPermissions
        run: |
          cat <<'EOF' > app_build/FixPermissions.command
          #!/bin/bash
          parent_path=$(cd "$(dirname "${BASH_SOURCE[0]}")" ; pwd -P)
          cd "$parent_path"
          echo "Setting permissions for TerrariaLauncher..."
          chmod -R +x TerrariaLauncher.app/
          if [ -d "iTerm.app" ]; then
            chmod -R +x iTerm.app/
          fi
          echo "Done! You can now close this window and launch the app."
          EOF
          chmod +x app_build/FixPermissions.command

      - name: Create macOS DMG
        run: |
          hdiutil create -volname "TerrariaLauncher-${{ steps.get_version.outputs.VERSION }}" \
                         -srcfolder app_build \
                         -ov -format UDZO \
                         TerrariaLauncher-macOS.dmg

      - name: Upload macOS Release
        uses: softprops/action-gh-release@v1
        with:
          files: TerrariaLauncher-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set Build Type and Version (Windows)
        shell: powershell
        run: |
          $val = "${{ steps.get_version.outputs.VERSION }}"
          $path = "app/src/main/resources/config.properties"
          (Get-Content $path) -replace '\$\{build.type\}', 'release' -replace '\$\{version\}', $val | Set-Content $path

      - name: Build ShadowJar
        run: .\gradlew shadowJar --no-daemon
        env:
          APP_VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Prepare jpackage input
        run: |
          mkdir app_jar
          copy app\build\libs\app-all.jar app_jar\TerrariaLauncher.jar

      - name: Create App Image
        run: |
          jpackage --type app-image `
            --dest app_build `
            --name "TerrariaLauncher" `
            --app-version ${{ steps.get_version.outputs.VERSION }} `
            --input app_jar/ `
            --main-jar TerrariaLauncher.jar `
            --main-class TerrariaLauncher.TerrariaLauncher `
            --icon package-resources/icon.ico `
            --copyright "Copyright 2026 amathew4538" `
            --description "A tModLoader Instance Manager"

      - name: Package Windows ZIP
        run: |
          Compress-Archive -Path app_build/TerrariaLauncher -DestinationPath TerrariaLauncher-Windows.zip

      - name: Upload Windows Release
        uses: softprops/action-gh-release@v1
        with:
          files: TerrariaLauncher-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}